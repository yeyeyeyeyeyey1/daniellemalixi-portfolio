<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danielle Angelo Malixi — Virtual Assistant & Graphic Designer</title>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text: #0a0a0a;
      --text-soft: #4a4a4a;
      --text-muted: #888888;
      --line: #e5e5e5;
      --accent: #0a0a0a;
      --accent-soft: #f0f0f0;
      --accent-dark: #000000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .serif { font-family: 'DM Serif Display', Georgia, serif; font-weight: 400; }
    a { color: inherit; }

    /* ===== NAV ===== */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(250, 250, 247, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease;
    }
    .nav.scrolled { border-bottom-color: var(--line); }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 1.1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo {
      font-size: 1.15rem; font-weight: 700;
      color: var(--text); text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.92rem; font-weight: 500;
      color: var(--text-soft); text-decoration: none;
      transition: color 0.2s ease;
      padding: 0.3rem 0;
      position: relative;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); }
    .nav-links a.active::after {
      content: ''; position: absolute;
      left: 0; right: 0; bottom: -2px;
      height: 2px; background: var(--accent); border-radius: 2px;
    }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 7rem 2rem 4rem;
      max-width: 1100px; margin: 0 auto;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 1fr;
      gap: 4rem;
      align-items: center;
      width: 100%;
    }
    @media (max-width: 820px) {
      .hero-grid { grid-template-columns: 1fr; gap: 2.5rem; text-align: center; }
      .hero-photo-wrap { order: -1; max-width: 280px; margin: 0 auto; }
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--accent-soft);
      color: var(--accent-dark);
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.82rem; font-weight: 600;
      margin-bottom: 1.5rem;
      opacity: 0; animation: rise 0.8s ease 0.1s forwards;
    }
    .hero-tag::before {
      content: ''; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
    }
    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      opacity: 0; animation: rise 0.9s ease 0.25s forwards;
    }
    .hero h1 .accent { color: var(--accent); }
    .hero-role {
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      color: var(--text-soft);
      margin-bottom: 1.5rem;
      font-weight: 500;
      opacity: 0; animation: rise 0.9s ease 0.4s forwards;
    }
    .hero-desc {
      font-size: 1.05rem;
      color: var(--text-soft);
      margin-bottom: 2.2rem;
      line-height: 1.75;
      max-width: 32rem;
      opacity: 0; animation: rise 0.9s ease 0.55s forwards;
    }
    .hero-actions {
      display: flex; flex-wrap: wrap; gap: 0.8rem;
      opacity: 0; animation: rise 0.9s ease 0.7s forwards;
    }
    @media (max-width: 820px) {
      .hero-actions { justify-content: center; }
    }
    .btn {
      font-size: 0.95rem; font-weight: 600;
      padding: 0.85rem 1.6rem;
      text-decoration: none;
      border-radius: 999px;
      transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.3); }
    .btn-ghost {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

    /* Profile photo */
    .hero-photo-wrap {
      position: relative;
      opacity: 0; animation: rise 1s ease 0.3s forwards;
    }
    .hero-photo {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 20%;
      background: var(--accent-soft);
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.15);
    }
    .hero-photo-deco {
      position: absolute;
      inset: -12px;
      border: 2px dashed var(--accent);
      border-radius: 50%;
      opacity: 0.5;
      animation: spin 30s linear infinite;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== SECTIONS ===== */
    .section { padding: 6rem 0; }
    .section-alt { background: #fff; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }

    .section-header {
      text-align: center;
      margin-bottom: 4rem;
    }
    .section-eyebrow {
      display: inline-block;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }
    .section-title {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .section-title em { font-style: normal; color: var(--accent); }
    .section-sub {
      color: var(--text-soft);
      font-size: 1.05rem;
      max-width: 36rem;
      margin: 1rem auto 0;
    }

    /* ===== ABOUT ===== */
    .about-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 3rem;
      align-items: start;
    }
    @media (max-width: 820px) { .about-grid { grid-template-columns: 1fr; gap: 2rem; } }
    .about-text p {
      color: var(--text-soft);
      font-size: 1.05rem;
      margin-bottom: 1.2rem;
      line-height: 1.8;
    }
    .about-text strong { color: var(--text); font-weight: 600; }
    .quickfacts {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2rem;
    }
    .quickfacts h4 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      font-weight: 600;
    }
    .fact-row {
      display: flex; justify-content: space-between;
      padding: 0.7rem 0;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
    }
    .fact-row:last-child { border-bottom: none; }
    .fact-row .key { color: var(--text-muted); }
    .fact-row .val { color: var(--text); font-weight: 500; text-align: right; }

    /* ===== EXPERIENCE / EDUCATION ===== */
    .cards { display: grid; gap: 1.2rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.1);
      border-color: var(--accent);
    }
    .card-head {
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .card h3 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }
    .card .when {
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 600;
      background: var(--accent-soft);
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      white-space: nowrap;
    }
    .card .where {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .card ul { list-style: none; }
    .card li {
      color: var(--text-soft);
      font-size: 0.96rem;
      padding: 0.3rem 0 0.3rem 1.4rem;
      position: relative;
      line-height: 1.6;
    }
    .card li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    /* ===== SKILLS ===== */
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.2rem;
    }
    .skill-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.8rem;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .skill-card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .skill-icon {
      width: 44px; height: 44px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 1.2rem;
      font-weight: 700;
    }
    .skill-card h4 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
    }
    .skill-card ul { list-style: none; }
    .skill-card li {
      color: var(--text-soft);
      font-size: 0.92rem;
      padding: 0.3rem 0;
    }
    .skill-card li::before {
      content: '— ';
      color: var(--accent);
    }

    /* ===== PORTFOLIO ===== */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .design-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .design-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.15);
    }
    .design-img-wrap {
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--accent-soft);
    }
    .design-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .design-card:hover .design-img { transform: scale(1.05); }
    .design-info {
      padding: 1.3rem 1.5rem;
    }
    .design-info h4 {
      font-size: 1.1rem; font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .design-info p {
      font-size: 0.88rem; color: var(--text-muted);
    }
    /* Modal */
    .modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(20, 20, 20, 0.85);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      animation: fadein 0.25s ease;
    }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    .modal img {
      max-width: 90vw; max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }
    .modal-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: #fff; color: var(--text);
      width: 44px; height: 44px;
      border: none; border-radius: 50%;
      cursor: pointer; font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease;
    }
    .modal-close:hover { transform: rotate(90deg) scale(1.1); }

    /* ===== TOOLS ===== */
    .tool-row { margin-bottom: 2rem; }
    .tool-row h4 {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .chip {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 0.55rem 1rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .chip:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-dark);
      transform: translateY(-2px);
    }

    /* ===== CERTIFICATES ===== */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .cert {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      display: flex; align-items: center; gap: 1rem;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }
    .cert:hover { border-color: var(--accent); transform: translateX(4px); }
    .cert-badge {
      width: 38px; height: 38px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
    }
    .cert p { font-size: 0.95rem; font-weight: 500; line-height: 1.4; }

    /* ===== CONTACT ===== */
    .contact {
      padding: 6rem 2rem 4rem;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .contact h2 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      line-height: 1.1;
    }
    .contact h2 em { font-style: normal; color: var(--accent); }
    .contact p {
      color: var(--text-soft);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      max-width: 32rem;
      margin-left: auto;
      margin-right: auto;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      max-width: 700px;
      margin: 0 auto;
    }
    .social-btn {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.4rem 1rem;
      text-decoration: none;
      color: var(--text);
      transition: all 0.3s ease;
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    }
    .social-btn:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 30px -15px rgba(0, 0, 0, 0.2);
    }
    .social-btn .label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .social-btn .value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .social-btn:hover .value { color: var(--accent); }

    /* ===== FOOTER ===== */
    .footer {
      border-top: 1px solid var(--line);
      padding: 2rem;
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-muted);
    }
    .footer span { color: var(--accent); font-weight: 600; }

    @media (max-width: 640px) {
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.8rem; }
      .nav-inner, .wrap { padding-left: 1.2rem; padding-right: 1.2rem; }
      .hero { padding: 6rem 1.2rem 3rem; }
      .section { padding: 4rem 0; }
      .contact { padding: 4rem 1.2rem; }
      .card, .skill-card { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const h = React.createElement;
    const F = React.Fragment;

    const NAV = ['home', 'about', 'experience', 'skills', 'portfolio', 'contact'];

    const EXPERIENCE = [
      {
        title: 'Social Media Manager',
        when: '2024 — 2025',
        where: 'VRML Demolition and Excavation Services · Philippines',
        bullets: [
          'Designed social media graphics and promotional images using Canva to support branding and visual content.',
          'Managed and scheduled posts across platforms to keep a consistent brand presence.',
          'Grew audience engagement through timely responses to comments and messages.',

          'Tracked post performance and adjusted content strategy based on engagement trends.',

      },
      {
        title: 'City Scholar — Administrative & Community Service',

        bullets: [
          'Provided administrative support at the barangay office, including filing and records management.',
          'Prepared, edited, and organized official documents using Microsoft Word and Excel.',
          'Assisted in drafting legal documents under the supervision of senior staff.',
          'Coordinated city events and academic seminars as event coordinator.',
          'Performed basic computer troubleshooting and technical assistance for office staff.',
        ],
      },
    ];

    const EDUCATION = [
      {
        title: 'Bachelor of Science in Information Technology',
        when: '2023 — Present',
        where: 'STI College SJDM · San Jose del Monte, Bulacan',
        bullets: ['Currently pursuing — focused on IT, databases, and systems.'],
      },
    ];

    const SKILLS = [
      {
        icon: '✦',
        title: 'Administrative Support',
        items: ['Document preparation & editing', 'Records & file management', 'Event coordination', 'Online research', 'Email & calendar management'],
      },
      {
        icon: '✿',
        title: 'Creative & Design',
        items: ['Graphic design (Canva)', 'Social media graphics', 'Promotional images', 'Brand visual content', 'Short-form content'],
      },
      {
        icon: '◆',
        title: 'Technical',
        items: ['Microsoft 365', 'Google Workspace', 'Basic SQL & MySQL', 'Google Analytics', 'Computer troubleshooting'],
      },
    ];

    const TOOLS = [
      { group: 'Microsoft 365', items: ['Word', 'Excel', 'PowerPoint', 'Outlook', 'Teams'] },
      { group: 'Google Workspace', items: ['Docs', 'Sheets', 'Drive', 'Gmail', 'Calendar'] },
      { group: 'Design & Social', items: ['Canva', 'Facebook', 'Instagram', 'TikTok', 'LinkedIn'] },
      { group: 'Other', items: ['MySQL', 'Google Analytics', 'Trello', 'ChatGPT'] },
    ];

    const CERTS = [
      'Google Analytics Certification',
      "Meet Canva's Visual Suite",
      'Canva Essentials Certificate',
      'With Honors — Senior High School',
      'Youth Talks: Digital Pathways for Sustainable Development',
      'Stand & Deliver: Public Speaking Workshop',
    ];

    const PORTFOLIO = [
      { src: 'design-flavor51.png', title: 'Flavor 51 North', category: 'Burger Reviews · Restaurant Promo' },
      { src: 'design-flavor51-shrimp.png', title: 'Flavor 51 North', category: 'Shrimp Menu Feature · Food Ad' },
      { src: 'design-addictions.png', title: 'My Addictions Boutique', category: 'Fashion Story · Glow in Yellow' },
      { src: 'design-addictions-hoodie.png', title: 'My Addictions Boutique', category: 'Cropped Hoodie · Product Feature' },
      { src: 'design-ultrean.png', title: 'Ultrean Air Fryer', category: 'Product Ad · E-Commerce' },
      { src: 'design-vitaboost.png', title: 'Vita-Boost Vitamin Drink', category: 'Flash Sale · Promotional Post' },
    ];

    const SOCIAL = [
      { label: 'Email', value: 'Send a message', href: 'mailto:mdanielleangelo@gmail.com' },
      { label: 'Phone', value: '0991 864 2590', href: 'tel:09918642590' },
      { label: 'Upwork', value: 'View profile', href: 'https://www.upwork.com/freelancers/~016f58b5fc0fb20890' },
      { label: 'OnlineJobs.ph', value: 'View profile', href: 'https://www.onlinejobs.ph/jobseekers/info/4781814' },
      { label: 'LinkedIn', value: 'Connect', href: 'https://www.linkedin.com/in/danielle-angelo-malixi-427470390/' },
    ];

    function Nav() {
      const [active, setActive] = useState('home');
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => {
          setScrolled(window.scrollY > 30);
          const pos = window.scrollY + 130;
          for (const id of NAV) {
            const el = document.getElementById(id);
            if (el && el.offsetTop <= pos && el.offsetTop + el.offsetHeight > pos) { setActive(id); break; }
          }
        };
        window.addEventListener('scroll', onScroll); onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return h('nav', { className: 'nav' + (scrolled ? ' scrolled' : '') },
        h('div', { className: 'nav-inner' },
          h('a', { href: '#home', className: 'nav-logo' }, 'Danielle', h('span', null, '.')),
          h('ul', { className: 'nav-links' },
            NAV.map(item => h('li', { key: item },
              h('a', { href: '#' + item, className: active === item ? 'active' : '' },
                item.charAt(0).toUpperCase() + item.slice(1))
            ))
          )
        )
      );
    }

    function Hero() {
      return h('section', { id: 'home', className: 'hero' },
        h('div', { className: 'hero-grid' },
          h('div', null,
            h('div', { className: 'hero-tag' }, 'Available for work'),
            h('h1', null,
              'Hi, I\'m ',
              h('span', { className: 'accent' }, 'Danielle'),
              h('br'),
              ' your next assistant.'
            ),
            h('p', { className: 'hero-role' },
              'Virtual Assistant · Social Media Manager · Graphic Designer'
            ),
            h('p', { className: 'hero-desc' },
              'A reliable IT student helping businesses stay organized through admin support, social media management, and creative design — delivering accurate, timely work that lets you focus on what matters.'
            ),
            h('div', { className: 'hero-actions' },
              h('a', { href: '#contact', className: 'btn btn-primary' }, 'Get in touch →'),
              h('a', { href: '#portfolio', className: 'btn btn-ghost' }, 'See my work')
            )
          ),
          h('div', { className: 'hero-photo-wrap' },
            h('div', { className: 'hero-photo-deco' }),
            h('img', { src: 'profile.jpg', alt: 'Danielle Angelo Malixi', className: 'hero-photo' })
          )
        )
      );
    }

    function About() {
      return h('section', { id: 'about', className: 'section section-alt' },
        h('div', { className: 'wrap' },
          h('div', { className: 'section-header' },
            h('span', { className: 'section-eyebrow' }, 'About me'),
            h('h2', { className: 'section-title' }, 'A little bit ', h('em', null, 'about who I am'))
          ),
          h('div', { className: 'about-grid' },
            h('div', { className: 'about-text' },
              h('p', null,
                'I\'m a ', h('strong', null, 'Bachelor of Science in Information Technology'), ' student at STI College SJDM with hands-on experience supporting real businesses through administrative work, social media management, and graphic design.'
              ),
              h('p', null,
                'My strength is ', h('strong', null, 'keeping things organized and easy to follow'), ' — whether that\'s preparing documents, managing a brand\'s online presence, or creating clean visuals that get people to click. I bring patience, attention to detail, and the kind of follow-through that makes a team\'s life easier.'
              ),
              h('p', null,
                'Currently open to virtual assistant and social media manager roles — happy to start with a short trial task so you can see how I work.'
              )
            ),
            h('div', { className: 'quickfacts' },
              h('h4', null, 'Quick facts'),
              h('div', { className: 'fact-row' },
                h('span', { className: 'key' }, 'Location'),
                h('span', { className: 'val' }, 'SJDM, Bulacan')
              ),
              h('div', { className: 'fact-row' },
                h('span', { className: 'key' }, 'Open to'),
                h('span', { className: 'val' }, 'Remote work')
              ),
              h('div', { className: 'fact-row' },
                h('span', { className: 'key' }, 'Languages'),
                h('span', { className: 'val' }, 'English, Filipino')
              ),
              h('div', { className: 'fact-row' },
                h('span', { className: 'key' }, 'Status'),
                h('span', { className: 'val' }, 'Available now')
              )
            )
          )
        )
      );
    }

    function TList(items) {
      return h('div', { className: 'cards' },
        items.map((t, i) =>
          h('div', { className: 'card', key: i },
            h('div', { className: 'card-head' },
              h('h3', null, t.title),
              h('span', { className: 'when' }, t.when)
            ),
            h('div', { className: 'where' }, t.where),
            h('ul', null, t.bullets.map((b, j) => h('li', { key: j }, b)))
          )
        )
      );
    }

    function Experience() {
      return h('section', { id: 'experience', className: 'section' },
        h('div', { className: 'wrap' },
          h('div', { className: 'section-header' },
            h('span', { className: 'section-eyebrow' }, 'My journey'),
            h('h2', { className: 'section-title' }, 'Work ', h('em', null, 'experience'))
          ),
          TList(EXPERIENCE),
          h('div', { className: 'section-header', style: { marginTop: '5rem' } },
            h('span', { className: 'section-eyebrow' }, 'Education'),
            h('h2', { className: 'section-title' }, 'What I\'m ', h('em', null, 'studying'))
          ),
          TList(EDUCATION)
        )
      );
    }

    function Skills() {
      return h('section', { id: 'skills', className: 'section section-alt' },
        h('div', { className: 'wrap' },
          h('div', { className: 'section-header' },
            h('span', { className: 'section-eyebrow' }, 'What I do' ),
            h('h2', { className: 'section-title' }, 'Skills & ', h('em', null, 'services'))
          ),
          h('div', { className: 'skill-grid' },
            SKILLS.map((s, i) =>
              h('div', { className: 'skill-card', key: i },
                h('div', { className: 'skill-icon' }, s.icon),
                h('h4', null, s.title),
                h('ul', null, s.items.map((x, j) => h('li', { key: j }, x)))
              )
            )
          ),
          h('div', { style: { marginTop: '4rem' } },
            h('h4', { style: { fontSize: '0.9rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', textAlign: 'center', marginBottom: '2rem', fontWeight: 600 } }, 'Tools I work with'),
            TOOLS.map((t, i) =>
              h('div', { className: 'tool-row', key: i, style: { textAlign: 'center' } },
                h('h4', null, t.group),
                h('div', { className: 'chips', style: { justifyContent: 'center' } },
                  t.items.map((x, j) => h('span', { className: 'chip', key: j }, x))
                )
              )
            )
          ),
          h('div', { style: { marginTop: '4rem' } },
            h('h4', { style: { fontSize: '0.9rem', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', textAlign: 'center', marginBottom: '2rem', fontWeight: 600 } }, 'Certifications & Training'),
            h('div', { className: 'cert-grid' },
              CERTS.map((c, i) =>
                h('div', { className: 'cert', key: i },
                  h('div', { className: 'cert-badge' }, '✓'),
                  h('p', null, c)
                )
              )
            )
          )
        )
      );
    }

    function Portfolio() {
      const [active, setActive] = useState(null);
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') setActive(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);
      return h(F, null,
        h('section', { id: 'portfolio', className: 'section' },
          h('div', { className: 'wrap' },
            h('div', { className: 'section-header' },
              h('span', { className: 'section-eyebrow' }, 'Portfolio'),
              h('h2', { className: 'section-title' }, 'Graphic ', h('em', null, 'design work')),
              h('p', { className: 'section-sub' }, 'A collection of social media ads and promotional designs across food, fashion, e-commerce, and health products. Click any design to see it bigger.')
            ),
            h('div', { className: 'portfolio-grid' },
              PORTFOLIO.map((p, i) =>
                h('div', { className: 'design-card', key: i, onClick: () => setActive(p) },
                  h('div', { className: 'design-img-wrap' },
                    h('img', { src: p.src, alt: p.title, className: 'design-img', loading: 'lazy' })
                  ),
                  h('div', { className: 'design-info' },
                    h('h4', null, p.title),
                    h('p', null, p.category)
                  )
                )
              )
            )
          )
        ),
        active && h('div', { className: 'modal', onClick: () => setActive(null) },
          h('button', { className: 'modal-close', onClick: () => setActive(null), 'aria-label': 'Close' }, '×'),
          h('img', { src: active.src, alt: active.title, onClick: (e) => e.stopPropagation() })
        )
      );
    }

    function Contact() {
      return h('section', { id: 'contact', className: 'contact' },
        h('span', { className: 'section-eyebrow' }, 'Let\'s connect'),
        h('h2', null, 'Have a project ', h('em', null, 'in mind?')),
        h('p', null, 'I\'d love to hear about it. Send me a message on any of the platforms below — I usually respond within a day.'),
        h('div', { className: 'contact-grid' },
          SOCIAL.map((s, i) =>
            h('a', { href: s.href, target: s.href.startsWith('http') ? '_blank' : null, rel: 'noopener', className: 'social-btn', key: i },
              h('span', { className: 'label' }, s.label),
              h('span', { className: 'value' }, s.value)
            )
          )
        )
      );
    }

    function App() {
      return h(F, null,
        h(Nav), h(Hero), h(About), h(Experience), h(Skills), h(Portfolio), h(Contact),
        h('footer', { className: 'footer' },
          '© 2026 Danielle Angelo Malixi · Built with ', h('span', null, 'React')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
